version: '3.7'

networks:
  tfgbv:
    name: tfgbv-network

volumes:
  fabric-ca-orderer:
  fabric-ca-org1:
  fabric-ca-org2:
  fabric-ca-org3:
  orderer.tfgbv.com:
  peer0.org1.tfgbv.com:
  peer0.org2.tfgbv.com:
  peer0.org3.tfgbv.com:
  couchdb0:
  couchdb1:
  couchdb2:

services:

  # ── CA Orderer ───────────────────────────────────────
  ca.tfgbv.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.tfgbv.com
    restart: unless-stopped
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-orderer
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17054
    ports:
      - 7054:7054
      - 17054:17054
    command: sh -c 'fabric-ca-server start -b admin:adminpw --cfg.identities.allowremove -d'
    volumes:
      - ./fabric-ca/orderer:/etc/hyperledger/fabric-ca-server
    networks:
      - tfgbv

  # ── CA Org1 ──────────────────────────────────────────
  ca.org1.tfgbv.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.org1.tfgbv.com
    restart: unless-stopped
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:18054
    ports:
      - 8054:8054
      - 18054:18054
    command: sh -c 'fabric-ca-server start -b admin:adminpw --cfg.identities.allowremove -d'
    volumes:
      - ./fabric-ca/org1:/etc/hyperledger/fabric-ca-server
    networks:
      - tfgbv

  # ── CA Org2 ──────────────────────────────────────────
  ca.org2.tfgbv.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.org2.tfgbv.com
    restart: unless-stopped
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org2
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=9054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:19054
    ports:
      - 9054:9054
      - 19054:19054
    command: sh -c 'fabric-ca-server start -b admin:adminpw --cfg.identities.allowremove -d'
    volumes:
      - ./fabric-ca/org2:/etc/hyperledger/fabric-ca-server
    networks:
      - tfgbv

  # ── CA Org3 ──────────────────────────────────────────
  ca.org3.tfgbv.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.org3.tfgbv.com
    restart: unless-stopped
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-org3
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=10054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:20054
    ports:
      - 10054:10054
      - 20054:20054
    command: sh -c 'fabric-ca-server start -b admin:adminpw --cfg.identities.allowremove -d'
    volumes:
      - ./fabric-ca/org3:/etc/hyperledger/fabric-ca-server
    networks:
      - tfgbv

  # ── Orderer ─────────────────────────────────────────
  orderer.tfgbv.com:
    image: hyperledger/fabric-orderer:2.5.15
    container_name: orderer.tfgbv.com
    restart: unless-stopped
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
    working_dir: /root
    command: orderer
    volumes:
      - ./organizations/ordererOrganizations/tfgbv.com/orderers/orderer.tfgbv.com/msp:/var/hyperledger/orderer/msp
      - ./organizations/ordererOrganizations/tfgbv.com/orderers/orderer.tfgbv.com/tls:/var/hyperledger/orderer/tls
      - orderer.tfgbv.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
      - 7053:7053
      - 9443:9443
    networks:
      - tfgbv

  # ── CouchDB Org1 ────────────────────────────────────
  couchdb0:
    image: couchdb:3.4.2
    container_name: couchdb0
    restart: unless-stopped
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 5984:5984
    volumes:
      - couchdb0:/opt/couchdb/data
    networks:
      - tfgbv

  # ── Peer Org1 ────────────────────────────────────────
  peer0.org1.tfgbv.com:
    image: hyperledger/fabric-peer:2.5.15
    container_name: peer0.org1.tfgbv.com
    restart: unless-stopped
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=tfgbv-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org1.tfgbv.com
      - CORE_PEER_ADDRESS=peer0.org1.tfgbv.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.tfgbv.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.tfgbv.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.tfgbv.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9444
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/org1.tfgbv.com/peers/peer0.org1.tfgbv.com/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/org1.tfgbv.com/peers/peer0.org1.tfgbv.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org1.tfgbv.com:/var/hyperledger/production
    ports:
      - 7051:7051
      - 9444:9444
    depends_on:
      - couchdb0
    networks:
      - tfgbv

  # ── CouchDB Org2 ────────────────────────────────────
  couchdb1:
    image: couchdb:3.4.2
    container_name: couchdb1
    restart: unless-stopped
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 7984:5984
    volumes:
      - couchdb1:/opt/couchdb/data
    networks:
      - tfgbv

  # ── Peer Org2 ────────────────────────────────────────
  peer0.org2.tfgbv.com:
    image: hyperledger/fabric-peer:2.5.15
    container_name: peer0.org2.tfgbv.com
    restart: unless-stopped
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=tfgbv-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org2.tfgbv.com
      - CORE_PEER_ADDRESS=peer0.org2.tfgbv.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org2.tfgbv.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org2.tfgbv.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org2.tfgbv.com:9051
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9445
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/org2.tfgbv.com/peers/peer0.org2.tfgbv.com/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/org2.tfgbv.com/peers/peer0.org2.tfgbv.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org2.tfgbv.com:/var/hyperledger/production
    ports:
      - 9051:9051
      - 9445:9445
    depends_on:
      - couchdb1
    networks:
      - tfgbv

  # ── CouchDB Org3 ────────────────────────────────────
  couchdb2:
    image: couchdb:3.4.2
    container_name: couchdb2
    restart: unless-stopped
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 9984:5984
    volumes:
      - couchdb2:/opt/couchdb/data
    networks:
      - tfgbv

  # ── Peer Org3 ────────────────────────────────────────
  peer0.org3.tfgbv.com:
    image: hyperledger/fabric-peer:2.5.15
    container_name: peer0.org3.tfgbv.com
    restart: unless-stopped
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=tfgbv-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org3.tfgbv.com
      - CORE_PEER_ADDRESS=peer0.org3.tfgbv.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org3.tfgbv.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org3.tfgbv.com:11051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org3.tfgbv.com:11051
      - CORE_PEER_LOCALMSPID=Org3MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9446
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb2:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/org3.tfgbv.com/peers/peer0.org3.tfgbv.com/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/org3.tfgbv.com/peers/peer0.org3.tfgbv.com/tls:/etc/hyperledger/fabric/tls
      - peer0.org3.tfgbv.com:/var/hyperledger/production
    ports:
      - 11051:11051
      - 9446:9446
    depends_on:
      - couchdb2
    networks:
      - tfgbv